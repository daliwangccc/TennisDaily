resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    set $frontend_upstream http://frontend:3000;
    set $backend_upstream  http://backend:8000;

    # 根路径显示导航页
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>My Services</title>
<style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f5f5}
.grid{display:grid;grid-template-columns:repeat(auto-fit,200px);gap:20px}
a{display:block;padding:40px 30px;background:#fff;border-radius:12px;text-decoration:none;color:#333;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:.2s}
a:hover{transform:translateY(-4px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
h2{margin:0 0 8px;font-size:18px}p{margin:0;font-size:13px;color:#888}</style>
</head><body><div class="grid">
<a href="/tennis/"><h2>TennisDaily</h2><p>网球资讯</p></a>
</div></body></html>';
    }

    # ── TennisDaily 网球站 ──
    location /tennis/ {
        proxy_pass $frontend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/ {
        proxy_pass $frontend_upstream;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── 以后加新项目在这里追加 ──
    # location /go/ {
    #     set $go_upstream http://go-game:3000;
    #     proxy_pass $go_upstream/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
    gzip_min_length 1024;
}
